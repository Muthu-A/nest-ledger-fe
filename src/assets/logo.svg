<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f4fbf9" />
      <stop offset="100%" stop-color="#e1f2ee" />
    </radialGradient>

    <!-- Brand Green Gradients -->
    <linearGradient id="primaryGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d6a4f" />
      <stop offset="100%" stop-color="#1b4332" />
    </linearGradient>

    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#52b788" />
      <stop offset="100%" stop-color="#2d6a4f" />
    </linearGradient>

    <linearGradient id="lightNest" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#74c69d" />
      <stop offset="100%" stop-color="#b7e4c7" />
    </linearGradient>

    <!-- Drop Shadow for App Icon Depth -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1b4332" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- App Icon Base Squircle -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" filter="url(#dropShadow)" />

  <!-- LOGO GRAPHIC GROUP -->
  <g transform="translate(0, -10)">
    
    <!-- LEDGER BOOK (The Core) -->
    <!-- Book Base/Pages -->
    <rect x="220" y="170" width="85" height="125" rx="8" fill="#ffffff" stroke="url(#primaryGreen)" stroke-width="8" stroke-linejoin="round" />
    <!-- Book Spine/Cover Detail -->
    <path d="M 220 170 L 220 295 M 232 170 L 232 295" fill="none" stroke="url(#primaryGreen)" stroke-width="6" stroke-linecap="round" />
    <!-- Ledger Lines (Subtle) -->
    <line x1="245" y1="260" x2="285" y2="260" stroke="#a3b19b" stroke-width="4" stroke-linecap="round" />
    <line x1="245" y1="272" x2="275" y2="272" stroke="#a3b19b" stroke-width="4" stroke-linecap="round" />

    <!-- GROWTH ARROW (The Financial Trend) -->
    <path d="M 190 265 L 245 220 L 275 240 L 320 185" fill="none" stroke="url(#accentGreen)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Arrow Head -->
    <path d="M 300 185 L 320 185 L 320 205" fill="none" stroke="url(#accentGreen)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />

    <!-- THE NEST (Surrounding Protective Layers) -->
    <!-- Outer Left/Bottom Swoop -->
    <path d="M 310 125 C 190 115 130 230 165 320 C 195 400 290 410 350 365 C 270 410 190 365 195 290 C 200 220 250 150 310 125 Z" fill="url(#primaryGreen)" />
    
    <!-- Mid Nest Layer -->
    <path d="M 180 300 C 170 360 230 405 310 395 C 370 385 400 320 375 255 C 395 315 360 375 295 375 C 220 375 185 330 180 300 Z" fill="url(#accentGreen)" />
    
    <!-- Inner Nest Layer (Light Accent) -->
    <path d="M 210 340 C 240 380 310 385 350 340 C 310 365 250 365 210 340 Z" fill="url(#lightNest)" />
    
    <!-- Top Right Framing Swoop -->
    <path d="M 280 115 C 350 125 390 180 375 240 C 385 190 355 140 280 115 Z" fill="url(#primaryGreen)" />

    <!-- FINANCIAL SPARK / SUCCESS STAR -->
    <g transform="translate(345, 150)">
      <path d="M 0 -18 C 0 -5 5 0 18 0 C 5 0 0 5 0 18 C 0 5 -5 0 -18 0 C -5 0 0 -5 0 -18 Z" fill="#52b788" />
      <circle cx="16" cy="-12" r="4" fill="#74c69d" />
    </g>

  </g>

  <!-- TEXT BRANDING (NestLedger) -->
  <text x="256" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#1b4332" text-anchor="middle" letter-spacing="0.5">NestLedger</text>
</svg>
